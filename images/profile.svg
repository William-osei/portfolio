<svg width="250" height="250" viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">William Osei Aborah profile avatar</title>
  <desc id="desc">A polished circular avatar with initials WO, gradient background, and a simple silhouette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.28" />
    </filter>
  </defs>
  <circle cx="125" cy="125" r="122" fill="url(#bg)" />
  <circle cx="125" cy="125" r="108" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="2" />
  <g filter="url(#shadow)">
    <circle cx="125" cy="86" r="34" fill="url(#accent)" />
    <path d="M125 132 C83 132 49 165 49 208 Q49 215 56 215 L194 215 Q201 215 201 208 C201 165 167 132 125 132Z" fill="url(#accent)" />
  </g>
  <text x="125" y="96" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a" text-anchor="middle">WO</text>
  <circle cx="125" cy="125" r="124" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
</svg>

